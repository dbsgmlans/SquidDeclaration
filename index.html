<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>징어 어록 채팅방</title>

  <style>
    body {
      font-family: Arial;
      background: #bde0fe;
      color: #333;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      width: 700px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 12px;
      border: none;
      background: #a2d2ff;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #e9ecef;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .number {
      width: 30px;
      font-weight: bold;
    }

    .text {
      flex: 1;
    }

    .delete {
      background: #ccc;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🦑 징어 어록</h1>

    <div class="input-area">
      <input id="input" type="text" placeholder="어록 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <ul id="list"></ul>
  </div>

  <!-- 🔥 Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyARCJuDrfDTlo-H-3mfnFbFTuYAh-3-LlM",
      authDomain: "squid-4f3c7.firebaseapp.com",
      projectId: "squid-4f3c7",
      storageBucket: "squid-4f3c7.firebasestorage.app",
      messagingSenderId: "967411396706",
      appId: "1:967411396706:web:349c2ba7615fe872e9213b"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const input = document.getElementById("input");
    const list = document.getElementById("list");

    // 🔥 실시간 데이터 불러오기
    db.collection("quotes").orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {
        list.innerHTML = "";
        let index = 1;

        snapshot.forEach(doc => {
          const data = doc.data();

          const li = document.createElement("li");
          li.innerHTML = `
            <span class="number">${index++}.</span>
            <span class="text">${data.text}</span>
            <span class="delete" onclick="deleteItem('${doc.id}')">삭제</span>
          `;

          list.appendChild(li);
        });
      });

    function addItem() {
      const text = input.value.trim();
      if (text === "") return;

      db.collection("quotes").add({
        text: text,
        createdAt: new Date()
      });

      input.value = "";
    }

    function deleteItem(id) {
      db.collection("quotes").doc(id).delete();
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        addItem();
      }
    });
  </script>
</body>
</html>
