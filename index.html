<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>징어 어록 채팅방</title>

  <style>
    body {
      font-family: Arial;
      background: #bde0fe;
      color: #333;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      width: 700px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 12px;
      border: none;
      background: #a2d2ff;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #e9ecef;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: grab;
    }

    .number {
      width: 30px;
      font-weight: bold;
    }

    .text {
      flex: 1;
    }

    .delete {
      background: #ccc;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }

    .dragging {
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🦑 징어 어록</h1>

    <div class="input-area">
      <input id="input" type="text" placeholder="어록 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyARCJuDrfDTlo-H-3mfnFbFTuYAh-3-LlM",
      authDomain: "squid-4f3c7.firebaseapp.com",
      projectId: "squid-4f3c7",
      storageBucket: "squid-4f3c7.firebasestorage.app",
      messagingSenderId: "967411396706",
      appId: "1:967411396706:web:349c2ba7615fe872e9213b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const input = document.getElementById("input");
    const list = document.getElementById("list");

    // 🔥 핵심: 전체 불러오고 JS에서 정렬
    db.collection("quotes")
      .onSnapshot(snapshot => {
        list.innerHTML = "";

        let docs = [];

        snapshot.forEach(doc => {
          docs.push({
            id: doc.id,
            ...doc.data()
          });
        });

        // 🔥 createdAt 기준 정렬 (없으면 뒤로)
        docs.sort((a, b) => {
          if (!a.createdAt) return 1;
          if (!b.createdAt) return -1;
          return b.createdAt.seconds - a.createdAt.seconds;
        });

        let index = 1;

        docs.forEach(data => {
          const li = document.createElement("li");
          li.draggable = true;
          li.dataset.id = data.id;

          li.innerHTML = `
            <span class="number">${index++}.</span>
            <span class="text">${data.text}</span>
            <span class="delete" onclick="deleteItem('${data.id}')">삭제</span>
          `;

          li.addEventListener("dragstart", () => {
            li.classList.add("dragging");
          });

          li.addEventListener("dragend", async () => {
            li.classList.remove("dragging");

            const elements = [...document.querySelectorAll("#list li")];

            for (let i = 0; i < elements.length; i++) {
              const id = elements[i].dataset.id;

              await db.collection("quotes").doc(id).update({
                order: i
              });
            }
          });

          list.appendChild(li);
        });
      });

    function addItem() {
      const text = input.value.trim();
      if (text === "") return;

      db.collection("quotes").add({
        text: text,
        createdAt: new Date(),
        order: Date.now()
      });

      input.value = "";
    }

    function deleteItem(id) {
      db.collection("quotes").doc(id).delete();
    }

    list.addEventListener("dragover", (e) => {
      e.preventDefault();

      const dragging = document.querySelector(".dragging");
      const afterElement = getDragAfterElement(list, e.clientY);

      if (afterElement == null) {
        list.appendChild(dragging);
      } else {
        list.insertBefore(dragging, afterElement);
      }
    });

    function getDragAfterElement(container, y) {
      const elements = [...container.querySelectorAll("li:not(.dragging)")];

      return elements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        addItem();
      }
    });
  </script>
</body>
</html>
