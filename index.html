<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오징어 어록 채팅방</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #4facfe, #00c6ff, #0072ff);
      color: white;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      width: 700px;
      background: rgba(0, 0, 0, 0.75);
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 12px;
      border: none;
      background: #ff4757;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #1e1e1e;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
    }

    .delete {
      background: #444;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🦑 오징어 어록</h1>

    <div class="input-area">
      <input id="input" type="text" placeholder="어록 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    const input = document.getElementById("input");
    const list = document.getElementById("list");

    // 🔥 저장된 데이터 불러오기
    let items = JSON.parse(localStorage.getItem("quotes")) || [];

    function saveItems() {
      localStorage.setItem("quotes", JSON.stringify(items));
    }

    function render() {
      list.innerHTML = "";
      items.forEach((text, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span>${text}</span>
          <span class="delete" onclick="removeItem(${index})">삭제</span>
        `;
        list.appendChild(li);
      });
    }

    function addItem() {
      const text = input.value.trim();
      if (text === "") return;

      items.unshift(text); // 최신 위
      saveItems();
      render();

      input.value = "";
    }

    function removeItem(index) {
      items.splice(index, 1);
      saveItems();
      render();
    }

    // 엔터 입력
    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        addItem();
      }
    });

    // 🔥 처음 실행 시 렌더링
    render();
  </script>
</body>
</html>
