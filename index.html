<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>징어 어록 채팅방</title>

  <style>
    body {
      font-family: Arial;
      background: #bde0fe;
      color: #333;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      width: 700px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 12px;
      border: none;
      background: #a2d2ff;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #e9ecef;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: grab;
    }

    .number {
      font-weight: bold;
      width: 30px;
    }

    .text {
      flex: 1;
    }

    .delete {
      background: #ccc;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }

    .dragging {
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🦑 징어 어록</h1>

    <div class="input-area">
      <input id="input" type="text" placeholder="어록 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    const input = document.getElementById("input");
    const list = document.getElementById("list");

    let items = JSON.parse(localStorage.getItem("quotes")) || [];

    function saveItems() {
      localStorage.setItem("quotes", JSON.stringify(items));
    }

    function render() {
      list.innerHTML = "";
      items.forEach((text, index) => {
        const li = document.createElement("li");
        li.draggable = true;

        li.innerHTML = `
          <span class="number">${index + 1}.</span>
          <span class="text">${text}</span>
          <span class="delete" onclick="removeItem(${index})">삭제</span>
        `;

        // 드래그 이벤트
        li.addEventListener("dragstart", () => {
          li.classList.add("dragging");
        });

        li.addEventListener("dragend", () => {
          li.classList.remove("dragging");
          updateOrder();
        });

        list.appendChild(li);
      });
    }

    function addItem() {
      const text = input.value.trim();
      if (text === "") return;

      items.unshift(text);
      saveItems();
      render();

      input.value = "";
    }

    function removeItem(index) {
      items.splice(index, 1);
      saveItems();
      render();
    }

    // 🔥 드래그 위치 계산
    list.addEventListener("dragover", (e) => {
      e.preventDefault();
      const afterElement = getDragAfterElement(list, e.clientY);
      const dragging = document.querySelector(".dragging");

      if (afterElement == null) {
        list.appendChild(dragging);
      } else {
        list.insertBefore(dragging, afterElement);
      }
    });

    function getDragAfterElement(container, y) {
      const elements = [...container.querySelectorAll("li:not(.dragging)")];

      return elements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    // 🔥 순서 업데이트 + 저장
    function updateOrder() {
      const newItems = [];
      document.querySelectorAll("#list li .text").forEach(el => {
        newItems.push(el.textContent);
      });

      items = newItems;
      saveItems();
      render();
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        addItem();
      }
    });

    render();
  </script>
</body>
</html>
