<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>징어 어록 채팅방</title>

  <style>
    body {
      font-family: Arial;
      /* 🎨 파스텔 하늘색 */
      background: #bde0fe;
      color: #333;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      width: 700px;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 12px;
      border: none;
      background: #a2d2ff;
      color: #333;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #e9ecef;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      color: #333;
    }

    .delete {
      background: #ccc;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🦑 징어 어록</h1>

    <div class="input-area">
      <input id="input" type="text" placeholder="어록 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    const input = document.getElementById("input");
    const list = document.getElementById("list");

    let items = JSON.parse(localStorage.getItem("quotes")) || [];

    function saveItems() {
      localStorage.setItem("quotes", JSON.stringify(items));
    }

    function render() {
      list.innerHTML = "";
      items.forEach((text, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span>${text}</span>
          <span class="delete" onclick="removeItem(${index})">삭제</span>
        `;
        list.appendChild(li);
      });
    }

    function addItem() {
      const text = input.value.trim();
      if (text === "") return;

      items.unshift(text);
      saveItems();
      render();

      input.value = "";
    }

    function removeItem(index) {
      items.splice(index, 1);
      saveItems();
      render();
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        addItem();
      }
    });

    render();
  </script>
</body>
</html>
