<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오징어 어록 채팅방</title>

  <style>
    body {
      font-family: Arial;
      /* 🎨 카툰 느낌 바다 (그라데이션) */
      background: linear-gradient(to bottom, #4facfe, #00c6ff, #0072ff);
      color: white;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    /* 🔥 가로 길이 2배 느낌 */
    .container {
      width: 700px;
      background: rgba(0, 0, 0, 0.75);
      padding: 20px;
      border-radius: 15px;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 12px;
      border: none;
      background: #ff4757;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    /* 🔥 어록 블록도 넓게 */
    li {
      background: #1e1e1e;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
    }

    .delete {
      background: #444;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🦑 오징어 어록</h1>

    <div class="input-area">
      <input id="input" type="text" placeholder="어록 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    const input = document.getElementById("input");
    const list = document.getElementById("list");

    function addItem() {
      const text = input.value.trim();
      if (text === "") return;

      const li = document.createElement("li");
      li.innerHTML = `
        <span>${text}</span>
        <span class="delete" onclick="removeItem(this)">삭제</span>
      `;

      list.prepend(li);
      input.value = "";
    }

    function removeItem(el) {
      el.parentElement.remove();
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        addItem();
      }
    });
  </script>
</body>
</html>
